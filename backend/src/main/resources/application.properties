spring.application.name=job-application-tracker

# Database Configuration
# Railway MySQL plugin provides MYSQL_URL, MYSQL_USER, MYSQL_PASSWORD
# Falls back to local dev values if not set
spring.datasource.url=${MYSQL_URL:${DATABASE_URL:jdbc:mysql://localhost:3306/job_tracker_db?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true}}
spring.datasource.username=${MYSQL_USER:${DATABASE_USERNAME:root}}
spring.datasource.password=${MYSQL_PASSWORD:${DATABASE_PASSWORD:Admin@#12345}}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true

# Server Port
server.port=${PORT:8080}

# Logging
logging.level.com.jobtracker=INFO
logging.level.org.springframework.web=INFO
